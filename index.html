<!DOCTYPE html>

<style>

:root{
  --bg1:#07070c;
  --bg2:#0c0f18;

  --glass:rgba(255,255,255,0.05);
  --glass2:rgba(255,255,255,0.03);

  --stroke:rgba(255,255,255,0.10);

  --text:#ffffff;
  --muted:rgba(255,255,255,0.6);

  /* 💛 Luxury Gold (not too yellow, more expensive tone) */
  --gold:#c8a85a;
  --gold2:#f3e2a2;

  /* optional accent */
  --accent:#d6b25e;
}

*{
  box-sizing:border-box;
  font-family:Inter,sans-serif;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  background:
    radial-gradient(circle at 20% 20%, #1a1f2e, transparent 40%),
    radial-gradient(circle at 80% 80%, #0a0d14, transparent 40%),
    linear-gradient(180deg, var(--bg1), var(--bg2));

  color:var(--text);
}

/* MAIN APP */
.app{
  width:390px;
  height:820px;
  border-radius:34px;
  padding:22px;
  overflow:hidden;

  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.12);

  box-shadow:
    0 20px 60px rgba(0,0,0,0.6),
    inset 0 0 0 1px rgba(255,255,255,0.05);

  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
}

/* SCREEN */
.screen{
  display:none;
  height:100%;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.screen.active{
  display:flex;
}

/* TITLES (lux gradient) */
h1{
  font-size:72px;
  font-weight:800;
  letter-spacing:6px;
  margin:0;

  background:linear-gradient(90deg,#fff,var(--gold2),var(--gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

h2{
  font-size:18px;
  margin:12px 0;
  color:var(--muted);
}

.sub{
  font-size:18px;
  letter-spacing:10px;
  color:var(--gold);
  margin-top:10px;
}

/* INPUTS (lux glass) */
input{
  width:100%;
  max-width:290px;
  padding:14px;
  margin-top:10px;
  border-radius:16px;

  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.04);
  color:#fff;

  text-align:center;

  backdrop-filter: blur(10px);
}

/* BUTTONS (lux gold edge) */
button{
  width:100%;
  max-width:290px;
  margin-top:14px;
  padding:14px;
  border-radius:16px;

  cursor:pointer;
  font-weight:700;

  color:#111;

  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:1px solid rgba(255,255,255,0.15);

  box-shadow:0 10px 25px rgba(0,0,0,0.35);
  transition:0.2s ease;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 14px 30px rgba(0,0,0,0.45);
}

/* CALENDAR ITEMS */
.months,.calendar,.times{
  display:flex;
  overflow-x:auto;
  gap:10px;
  max-width:300px;
}

.monthItem,.day,.time{
  flex:0 0 auto;
  padding:10px 14px;
  border-radius:999px;

  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.03);

  font-size:12px;
  cursor:pointer;

  transition:0.2s ease;
}

/* DAY CARD */
.day{
  width:64px;
  height:72px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border-radius:18px;
}

/* ACTIVE GOLD SELECTION */
.monthItem.active,
.day.active,
.time.selected{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
  border:1px solid rgba(255,255,255,0.2);
}

/* BLOCKED */
.time.blocked{
  background:rgba(255,60,60,0.15);
  color:#ff6b6b;
  pointer-events:none;
}

/* ADMIN BOX */
#adminDayBox > div{
  margin-top:10px;
  padding:12px;
  border-radius:14px;

  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
}

/* CANCEL BUTTON (lux red glass) */
.iosCancelBtn{
  width:100%;
  max-width:290px;
  margin-top:14px;
  padding:14px;

  border-radius:16px;

  border:1px solid rgba(255,80,80,0.35);
  background:rgba(255,80,80,0.12);

  color:#ff6b6b;
  font-weight:600;

  backdrop-filter: blur(10px);
  transition:0.2s ease;
}

.iosCancelBtn:active{
  transform:scale(0.98);
  background:rgba(255,80,80,0.2);
}

/* HOME LIST */
#homeAppointments{
  width:100%;
  max-width:300px;
  margin-top:10px;

  max-height:260px;
  overflow-y:auto;

  display:flex;
  flex-direction:column;
  gap:10px;

  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}

/* ANIMATION LUX */
@keyframes glowIn{
  0%{opacity:0; transform:scale(0.9);}
  100%{opacity:1; transform:scale(1);}
}

#s4.active h1{
  animation:glowIn 0.4s ease-out;
}

#receipt{
  animation:fadeUp 0.5s ease-out;
}

.screen{
  transition:all 0.3s ease;
}

h1{
  font-family:"Playfair Display", serif !important;
  font-size:70px;
  margin:0;
  letter-spacing:10px;
  text-transform:uppercase;

  color:var(--brown);

  text-shadow:0 10px 30px rgba(139,94,60,0.2);
}

</style>

</head>

/* ================= BOOKING ================= */

function initBooking(){

  monthIndex = 0;
  selectedTime = null;

  const now = new Date();

  // σωστό format ημερομηνίας (ίδιο με το υπόλοιπο app σου)
  selectedDay =
    now.getFullYear() + "-" +
    (now.getMonth() + 1) + "-" +
    now.getDate();

  months = [];

  for(let i=0;i<12;i++){
    months.push(new Date(now.getFullYear(), now.getMonth()+i, 1));
  }

  renderMonths();
  renderCalendar();
  renderTimes();
}

function renderMonths(){
  const box = document.getElementById("months");
  box.innerHTML = "";

  months.forEach((m,i)=>{
    const d = document.createElement("div");
    d.className = "monthItem" + (i===monthIndex?" active":"");
    d.innerText = m.toLocaleString("el",{month:"short"});

    d.onclick = ()=>{
      monthIndex = i;
      renderMonths();
      renderCalendar();
    };

    box.appendChild(d);
  });
}

function renderCalendar(){
  const box = document.getElementById("cal");
  box.innerHTML = "";

  const m = months[monthIndex];
  const days = new Date(m.getFullYear(), m.getMonth() + 1, 0).getDate();

  const weekdays = ["Κυριακή","Δευτέρα","Τρίτη","Τετάρτη","Πέμπτη","Παρασκευή","Σάββατο"];

  const today = new Date();
  today.setHours(0,0,0,0);

  for(let i = 1; i <= days; i++){

    const currentDate = new Date(
      m.getFullYear(),
      m.getMonth(),
      i
    );

    const isPast = currentDate < today;

    const date = `${m.getFullYear()}-${m.getMonth()+1}-${i}`;

    const div = document.createElement("div");
    div.className = "day" + (selectedDay === date ? " active" : "");
    div.dataset.date = date;

    const dayName = weekdays[currentDate.getDay()];

    div.innerHTML = `
      <div style="font-size:18px;font-weight:600">${i}</div>
      <div style="font-size:10px;opacity:0.7">${dayName}</div>
    `;

    // ❌ ΠΑΛΙΕΣ ΜΕΡΕΣ = ΕΜΦΑΝΙΖΟΝΤΑΙ ΑΛΛΑ DISABLED
    if(isPast){
      div.style.opacity = "0.25";
      div.style.pointerEvents = "none";
    } else {
      div.onclick = () => {
        selectedDay = date;
        selectedTime = null;
        renderCalendar();
        renderTimes();
      };
    }

    box.appendChild(div);
  }
}

if(!selectedDay){
  const today = new Date();

  selectedDay =
    today.getFullYear() + "-" +
    (today.getMonth() + 1) + "-" +
    today.getDate();
}

setTimeout(() => {

    });

}, 50);

function renderTimes(){
  const box = document.getElementById("times");
  box.innerHTML = "";

  if(!selectedDay) return;

  const isBlocked = blocked.some(b => String(b.day) === selectedDay);
  if(isBlocked){
    box.innerHTML = "<div>Η μέρα είναι κλειστή</div>";
    return;
  }

  for(let h=10; h<=20; h++){
    ["00","30"].forEach(m=>{

      const t = `${h}:${m}`;

      const exists = booked.some(b =>
        String(b.day) === selectedDay &&
        String(b.time) === t
      );

      if(exists) return;

      const div = document.createElement("div");
      div.className = "time" + (selectedTime===t?" selected":"");
      div.innerText = t;

      div.onclick = ()=>{
        selectedTime = t;
        renderTimes();
      };

      box.appendChild(div);
    });
  }
}

/* ================= BOOK ================= */

const now = new Date();

// selected date (χωρίς ώρα)

if(selectedDate < today){

if(selectedDate.getTime() === today.getTime()){

 if(existingBooking){

}
const pin = phone.slice(-4);

  await client.from("appointmentsnew").insert([{

document.getElementById("receipt").innerHTML = `

  <br>

  <div style="text-align:center;font-size:18px;font-weight:800;color:#d6b25e;">
    Κωδικός ακύρωσης: ${pin}
  </div>

  <hr style="opacity:0.2;">
`;

const screen3 = document.getElementById("s3");

screen3.style.transition = "0.3s";
screen3.style.transform = "scale(0.95)";
screen3.style.opacity = "0.5";

setTimeout(() => {
  screen3.style.transform = "scale(1)";
  screen3.style.opacity = "1";

  go(4);

}


/* ================= CANCEL PRO FIXED ================= */

async function cancelBookingPro(){

  const phone = prompt("Τηλέφωνο:");
  if(!phone) return;

  const cleanPhone = phone.trim();
  const expectedPin = cleanPhone.slice(-4);

  const pin = prompt("PIN:");
  if(!pin) return;

  if(pin !== expectedPin){
    alert("Λάθος PIN");
    return;
  }

  const { data, error } = await client
    .from("appointmentsnew")
    .select("*")
    .eq("phone", cleanPhone)
    .eq("pin", expectedPin);

  if(error){
    alert("Σφάλμα σύνδεσης");
    return;
  }

  if(!data || data.length === 0){
    alert("Δεν βρέθηκαν ραντεβού");
    return;
  }

  let text = "Τα ραντεβού σου:\n\n";

  data.forEach((b, i) => {
    text += `${i+1}) ${b.day} - ${b.time}\n`;
  });

  const choice = prompt(text + "\nΓράψε αριθμό για ακύρωση:");

  const index = parseInt(choice) - 1;

  if(!data[index]){
    alert("Άκυρη επιλογή");
    return;
  }

  const booking = data[index];

  const ok = confirm(`Να ακυρωθεί ${booking.day} ${booking.time};`);
  if(!ok) return;

  const { error: delError } = await client
    .from("appointmentsnew")
    .delete()
    .eq("id", booking.id);

  if(delError){
    alert("Σφάλμα ακύρωσης");
    return;
  }

  alert("Ακυρώθηκε!");

  // reload λίστα αν ξαναθέλει
  cancelBookingPro();
}

    `;

    box.appendChild(div);
  });
}

async function deleteHome(id){

  const ok = confirm("Να ακυρωθεί;");
  if(!ok) return;

  const { error } = await client
    .from("appointmentsnew")
    .delete()
    .eq("id", id);

  if(error){
    alert("Σφάλμα");
    return;
  }

  alert("Ακυρώθηκε!");

  // refresh
  loginHome();
}
