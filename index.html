<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JOHN Barber</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg1:#07070a;
  --bg2:#0f0f14;
  --glass:rgba(255,255,255,0.06);
  --glass2:rgba(255,255,255,0.03);
  --stroke:rgba(255,255,255,0.08);
  --text:#ffffff;
  --muted:rgba(255,255,255,0.55);
  --gold:#d6b25e;
  --gold2:#ffdf8a;
}

*{box-sizing:border-box;font-family:Inter,sans-serif;}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    radial-gradient(circle at 20% 20%, #1a1a22, transparent 40%),
    radial-gradient(circle at 80% 80%, #0d0d12, transparent 40%),
    linear-gradient(180deg, var(--bg1), var(--bg2));
  color:var(--text);
}

.app{
  width:390px;
  height:820px;
  border-radius:34px;
  padding:22px;
  overflow:hidden;
  background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
  border:1px solid var(--stroke);
}

.screen{
  display:none;
  height:100%;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.screen.active{display:flex;}

h1{
  font-size:64px;
  letter-spacing:4px;
  margin:0;
  background:linear-gradient(90deg,#fff,var(--gold2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

h2{font-size:18px;margin:12px 0;}

.sub{
  font-size:20px;
  letter-spacing:8px;
  color:var(--gold);
  margin-top:8px;
}

input{
  width:100%;
  max-width:290px;
  padding:14px;
  margin-top:10px;
  border-radius:16px;
  border:1px solid var(--stroke);
  background:var(--glass2);
  color:#fff;
  text-align:center;
}

button{
  width:100%;
  max-width:290px;
  margin-top:14px;
  padding:14px;
  border-radius:16px;
  border:none;
  cursor:pointer;
  font-weight:700;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.months,.calendar,.times{
  display:flex;
  overflow-x:auto;
  gap:10px;
  max-width:300px;
}

.monthItem,.day,.time{
  flex:0 0 auto;
  padding:10px 14px;
  border-radius:999px;
  border:1px solid var(--stroke);
  background:var(--glass2);
  font-size:12px;
  cursor:pointer;
}

.day{
  width:64px;height:72px;
  display:flex;align-items:center;justify-content:center;
  border-radius:18px;
  flex-direction:column;
}

.monthItem.active,.day.active,.time.selected{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#111;
}

.time.blocked{
  background:rgba(255,59,48,0.2);
  pointer-events:none;
}

/* ADMIN */
#adminCalendar .day{margin:4px;}
#adminCalendar .hasBooking{border:1px solid var(--gold);}

#adminDayBox > div{
  margin-top:10px;
  padding:14px;
  border-radius:18px;
  background:var(--glass);
  border:1px solid var(--stroke);
}

#adminDayBox{
  width:100%;
  max-height:300px;
  overflow-y:auto;
  margin-top:10px;
}

#adminDayBox > div{
  margin-top:10px;
  padding:12px;
  border-radius:14px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  text-align:left;
}

h1{
  font-size:72px;
  font-weight:700;
  letter-spacing:6px;
}

.day.blocked{
  background:rgba(255,59,48,0.25);
  border:1px solid rgba(255,59,48,0.6);
  color:#ff4d4d;
}

.iosCancelBtn{
  width:100%;
  max-width:290px;
  margin-top:14px;
  padding:14px;
  border-radius:16px;

  border:1px solid rgba(255,59,48,0.35);
  background:rgba(255,59,48,0.12);

  color:#ff4d4d;
  font-weight:600;
  font-size:14px;
  letter-spacing:0.5px;

  cursor:pointer;

  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  transition:0.2s ease;
}

.iosCancelBtn:active{
  transform:scale(0.98);
  background:rgba(255,59,48,0.2);
}

#homeAppointments{
  width:100%;
  max-width:300px;
  margin-top:10px;

  max-height:260px;
  overflow-y:auto;

  display:flex;
  flex-direction:column;
  gap:10px;
}

#homeAppointments{
  scroll-behavior:smooth;
  -webkit-overflow-scrolling: touch;
}

@keyframes popIn {
  0% {
    transform: scale(0.7);
    opacity: 0;
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}

@keyframes fadeUp {
  0% {
    transform: translateY(20px);
    opacity: 0;
  }
  100% {
    transform: translateY(0);
    opacity: 1;
  }
}

#s4.active h1 {
  animation: popIn 0.4s ease-out;
}

#receipt {
  animation: fadeUp 0.5s ease-out;
}

.screen {
  transition: all 0.3s ease;
}

</style>
</head>

<body>

<div class="app">

<!-- HOME -->

<div id="s1" class="screen active">
  <h1>JOHN</h1>
  <div class="sub">BARBER</div>

  <!-- BOOK -->
  <button onclick="go(2)">
    ΚΛΕΙΣΕ ΡΑΝΤΕΒΟΥ
  </button>

  <hr style="width:80%;opacity:0.2;margin:20px 0;">

  <!-- LOGIN AREA -->
  <h2> Ακύρωση Ραντεβού </h2>

  <input id="homePhone" placeholder="Τηλέφωνο"/>
  <input id="homePin" placeholder="Κωδικός"/>

  <button onclick="loginHome()">ΕΙΣΟΔΟΣ</button>

  <div id="homeAppointments"></div>
</div>

<!-- USER -->
<div id="s2" class="screen">
  <h2>Στοιχεία</h2>
  <input id="name" placeholder="Όνομα"/>
  <input id="phone" placeholder="Τηλέφωνο"/>

  <button onclick="go(3)">ΣΥΝΕΧΕΙΑ</button>
  <button onclick="go(1)">ΠΙΣΩ</button>
</div>

<!-- BOOK -->
<div id="s3" class="screen">

  <h2>Μήνας</h2>
  <div class="months" id="months"></div>

  <h2>Ημέρα</h2>
  <div class="calendar" id="cal"></div>

  <h2>Ώρα</h2>
  <div class="times" id="times"></div>

  <button onclick="book()">ΚΡΑΤΗΣΗ</button>

<button onclick="go(2)" style="background:rgba(255,255,255,0.08);color:#fff;">
  ΠΙΣΩ
</button>
</div>

<!-- SUCCESS -->

<div id="s4" class="screen">
  <h1>✔</h1>

  <div class="sub">Το ραντεβού σου καταχωρήθηκε</div>

  <div id="receipt"
       style="
        margin-top:20px;
        width:100%;
        max-width:300px;
        text-align:left;
        font-size:14px;
        line-height:1.6;
        opacity:0.9;
       ">
  </div>

  <button onclick="go(1)">EXIT</button>
</div>

<!-- ADMIN -->
<div id="s5" class="screen">

  <h2>ΡΑΝΤΕΒΟΥ</h2>

  <h2>Μήνας</h2>
  <div class="months" id="adminMonths"></div>

  <h2>Ημέρα</h2>
  <div class="calendar" id="adminCalendar"></div>

  <div id="adminDayBox"></div>

<button onclick="toggleDayBlock()" id="blockBtn">
  ΚΛΕΙΣΤΟ / ΑΝΟΙΧΤΟ
</button>

  <button onclick="go(1)">ΠΙΣΩ</button>
</div>

</div>

<script>

const client = supabase.createClient(
  "https://zumhdqkwsllpvcirmcfx.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1bWhkcWt3c2xscHZjaXJtY2Z4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MDA5ODUsImV4cCI6MjA5NDQ3Njk4NX0.KT7eqBsfuzT8V-rQUIp31POR9gusoHJXmxvXjlUy3OU"
);

let screen = 1;

let months = [], monthIndex = 0;
let adminMonths = [], adminMonthIndex = 0;

let selectedDay = null;
let selectedTime = null;

let booked = [];
let blocked = [];
let adminSelectedDay = null;

async function loginHome(){

  const phone = document.getElementById("homePhone").value.trim();
  const pin = document.getElementById("homePin").value.trim();

  if(!phone || !pin){
    alert("Συμπλήρωσε στοιχεία");
    return;
  }

  const expectedPin = phone.slice(-4);

  if(pin !== expectedPin){
    alert("Λάθος PIN");
    return;
  }

  const { data, error } = await client
    .from("appointmentsnew")
    .select("*")
    .eq("phone", phone)
    .eq("pin", pin);

  if(error){
    alert("Σφάλμα");
    return;
  }

  if(!data || data.length === 0){
    alert("Δεν βρέθηκαν ραντεβού");
    return;
  }

  renderHomeAppointments(data);
}

/* ================= HELPERS ================= */

function generatePIN(){
  return Math.floor(1000 + Math.random() * 9000).toString();
}

/* ================= LOAD ================= */

async function load(){
  const { data } = await client.from("appointmentsnew").select("*");
  booked = data || [];
}

async function loadBlocked(){
  const { data, error } = await client
    .from("blocked_days")
    .select("*");

  if(error){
    console.error(error);
    return;
  }

  blocked = data || [];
}

/* ================= NAV ================= */

async function go(n){
  document.getElementById("s"+screen).classList.remove("active");
  document.getElementById("s"+n).classList.add("active");
  screen = n;

  if(n === 3){
    await load();
    await loadBlocked();
    initBooking();
  }

  if(n === 5){
    await load();
    await loadBlocked();
    initAdmin();
    renderAdminMonths();
    renderAdminCalendar();
  }
}

/* ================= BOOKING ================= */

function initBooking(){
  const now = new Date();
  months = [];

  for(let i=0;i<12;i++){
    months.push(new Date(now.getFullYear(), now.getMonth()+i, 1));
  }

  renderMonths();
  renderCalendar();
  renderTimes();
}

function renderMonths(){
  const box = document.getElementById("months");
  box.innerHTML = "";

  months.forEach((m,i)=>{
    const d = document.createElement("div");
    d.className = "monthItem" + (i===monthIndex?" active":"");
    d.innerText = m.toLocaleString("el",{month:"short"});

    d.onclick = ()=>{
      monthIndex = i;
      renderMonths();
      renderCalendar();
    };

    box.appendChild(d);
  });
}

function renderCalendar(){
  const box = document.getElementById("cal");
  box.innerHTML = "";

  const m = months[monthIndex];
  const days = new Date(m.getFullYear(), m.getMonth() + 1, 0).getDate();

  const weekdays = ["Κυριακή","Δευτέρα","Τρίτη","Τετάρτη","Πέμπτη","Παρασκευή","Σάββατο"];

  for(let i = 1; i <= days; i++){

    const date = `${m.getFullYear()}-${m.getMonth()+1}-${i}`;

    const div = document.createElement("div");
    div.className = "day" + (selectedDay === date ? " active" : "");

    const dateObj = new Date(m.getFullYear(), m.getMonth(), i);
    const dayName = weekdays[dateObj.getDay()];

    div.innerHTML = `
      <div style="font-size:18px;font-weight:600">${i}</div>
      <div style="font-size:10px;opacity:0.7">${dayName}</div>
    `;

    div.onclick = () => {
      selectedDay = date;
      selectedTime = null;
      renderCalendar();
      renderTimes();
    };

    box.appendChild(div);
  }
}

function renderTimes(){
  const box = document.getElementById("times");
  box.innerHTML = "";

  if(!selectedDay) return;

  const isBlocked = blocked.some(b => String(b.day) === selectedDay);
  if(isBlocked){
    box.innerHTML = "<div>Η μέρα είναι κλειστή</div>";
    return;
  }

  for(let h=10; h<=20; h++){
    ["00","30"].forEach(m=>{

      const t = `${h}:${m}`;

      const exists = booked.some(b =>
        String(b.day) === selectedDay &&
        String(b.time) === t
      );

      if(exists) return;

      const div = document.createElement("div");
      div.className = "time" + (selectedTime===t?" selected":"");
      div.innerText = t;

      div.onclick = ()=>{
        selectedTime = t;
        renderTimes();
      };

      box.appendChild(div);
    });
  }
}

/* ================= BOOK ================= */

async function book(){

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();

const now = new Date();

// selected date (χωρίς ώρα)
const selectedDate = new Date(selectedDay);

// αν είναι παρελθόν μέρα
const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

if(selectedDate < today){
  alert("Η επιλεγμένη ημερομηνία δεν είναι διαθέσιμη για κράτηση");
  return;
}

if(selectedDate.getTime() === today.getTime()){

  const [h, m] = selectedTime.split(":");
  const selectedTimeDate = new Date();
  selectedTimeDate.setHours(h, m, 0, 0);

  if(selectedTimeDate < now){
    alert("Δεν μπορείς να κλείσεις ραντεβού σε παρελθοντική ώρα.");
    return;
  }
}

  await load();

  if(!name || !phone){
    alert("Συμπλήρωσε όνομα και τηλέφωνο");
    return;
  }

  if(!selectedDay || !selectedTime){
    alert("Διάλεξε μέρα και ώρα");
    return;
  }

  const alreadyTaken = booked.some(b =>
    String(b.day) === selectedDay &&
    String(b.time) === selectedTime
  );

  if(alreadyTaken){
    alert("Η ώρα μόλις έκλεισε. Διάλεξε άλλη.");
    return;
  }

  const existingBooking = booked.find(b =>
    b.phone === phone && b.day === selectedDay
  );

 if(existingBooking){
  alert(`Έχεις ήδη ραντεβού αυτή τη μέρα στις ${existingBooking.time}.`);
  return;
}
const pin = phone.slice(-4);

  await client.from("appointmentsnew").insert([{
    name,
    phone,
    day: selectedDay,
    time: selectedTime,
    pin
  }]);

document.getElementById("receipt").innerHTML = `
  <div style="text-align:center;font-weight:700;font-size:16px;margin-bottom:10px;">
    ΚΡΑΤΗΣΗ
  </div>

  <hr style="opacity:0.2;">

  <div><b>Όνομα:</b> ${name}</div>
  <div><b>Μέρα:</b> ${selectedDay}</div>
  <div><b>Ώρα:</b> ${selectedTime}</div>
  <div><b>Τηλ:</b> ${phone}</div>

  <br>

  <div style="text-align:center;font-size:18px;font-weight:800;color:#d6b25e;">
    Κωδικός ακύρωσης: ${pin}
  </div>

  <hr style="opacity:0.2;">
`;

const screen3 = document.getElementById("s3");

screen3.style.transition = "0.3s";
screen3.style.transform = "scale(0.95)";
screen3.style.opacity = "0.5";

setTimeout(() => {
  screen3.style.transform = "scale(1)";
  screen3.style.opacity = "1";

  go(4);
}, 200);

}


/* ================= CANCEL PRO FIXED ================= */

async function cancelBookingPro(){

  const phone = prompt("Τηλέφωνο:");
  if(!phone) return;

  const cleanPhone = phone.trim();
  const expectedPin = cleanPhone.slice(-4);

  const pin = prompt("PIN:");
  if(!pin) return;

  if(pin !== expectedPin){
    alert("Λάθος PIN");
    return;
  }

  const { data, error } = await client
    .from("appointmentsnew")
    .select("*")
    .eq("phone", cleanPhone)
    .eq("pin", expectedPin);

  if(error){
    alert("Σφάλμα σύνδεσης");
    return;
  }

  if(!data || data.length === 0){
    alert("Δεν βρέθηκαν ραντεβού");
    return;
  }

  let text = "Τα ραντεβού σου:\n\n";

  data.forEach((b, i) => {
    text += `${i+1}) ${b.day} - ${b.time}\n`;
  });

  const choice = prompt(text + "\nΓράψε αριθμό για ακύρωση:");

  const index = parseInt(choice) - 1;

  if(!data[index]){
    alert("Άκυρη επιλογή");
    return;
  }

  const booking = data[index];

  const ok = confirm(`Να ακυρωθεί ${booking.day} ${booking.time};`);
  if(!ok) return;

  const { error: delError } = await client
    .from("appointmentsnew")
    .delete()
    .eq("id", booking.id);

  if(delError){
    alert("Σφάλμα ακύρωσης");
    return;
  }

  alert("Ακυρώθηκε!");

  // reload λίστα αν ξαναθέλει
  cancelBookingPro();
}

function renderHomeAppointments(data){

  const box = document.getElementById("homeAppointments");
  box.innerHTML = "";

  data.forEach((b)=>{

    const div = document.createElement("div");

    div.style = `
      margin-top:12px;
      padding:14px;
      border-radius:16px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      text-align:left;
    `;

    div.innerHTML = `
      <div><b>Όνομα:</b> ${b.name}</div>
      <div><b>Μέρα:</b> ${b.day}</div>
      <div><b>Ώρα:</b> ${b.time}</div>
      <div><b>Τηλ:</b> ${b.phone}</div>

      <button onclick="deleteHome('${b.id}')"
        style="
          margin-top:12px;
          width:100%;
          padding:10px;
          border-radius:12px;
          background:rgba(255,59,48,0.15);
          color:#ff4d4d;
          border:1px solid rgba(255,59,48,0.35);
          font-weight:600;
        ">
        Διαγραφή
      </button>

      <hr style="margin-top:12px;opacity:0.2;">
    `;

    box.appendChild(div);
  });
}

async function deleteHome(id){

  const ok = confirm("Να ακυρωθεί;");
  if(!ok) return;

  const { error } = await client
    .from("appointmentsnew")
    .delete()
    .eq("id", id);

  if(error){
    alert("Σφάλμα");
    return;
  }

  alert("Ακυρώθηκε!");

  // refresh
  loginHome();
}

</script>
